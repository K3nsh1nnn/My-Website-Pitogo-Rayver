<!DOCTYPE html><html><head><style>p {outline-color:red;}p.dotted {outline-style: dotted;}p.dashed {outline-style: dashed;}p.solid {outline-style: solid;}p.double {outline-style: double;}p.groove {outline-style: groove;}p.ridge {outline-style: ridge;}p.inset {outline-style: inset;}p.outset {outline-style: outset;}</style></head><body><h2>The outline-style Property</h2><p class="dotted">Rayver Pogi 123</p><p class="dashed">Rayver Pogi 123</p><p class="solid">Rayver Pogi 123</p><p class="double">Rayver Pogi 123</p><p class="groove">Rayver Pogi 123</p><p class="ridge">Rayver Pogi 123</p><p class="inset">Rayver Pogi 123</p><p class="outset">Rayver Pogi 123</p></body></html>
